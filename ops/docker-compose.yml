version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: asta-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - asta-network

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: asta-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ..:/app
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --workers 1
    networks:
      - asta-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  kokoro:
    image: ghcr.io/remsky/kokoro-onnx:latest
    container_name: asta-kokoro
    ports:
      - "8880:8880"
    restart: always
    networks:
      - asta-network

  embedder:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: asta-embedder
    command: --model-id sentence-transformers/all-MiniLM-L6-v2 --port 8080
    ports:
      - "8080:8080"
    restart: always
    networks:
      - asta-network

volumes:
  redis_data:

networks:
  asta-network:
    driver: bridge
